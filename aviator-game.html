<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AeroX – Virtual Crash Game</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #060a0f;
    --surface: #0d1520;
    --surface2: #111c2d;
    --border: #1e3050;
    --accent: #e63946;
    --accent2: #ff6b35;
    --green: #2ecc71;
    --yellow: #f1c40f;
    --text: #e8f4fd;
    --muted: #5a7fa0;
    --glow: 0 0 20px rgba(230,57,70,0.5);
    --glow-green: 0 0 20px rgba(46,204,113,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 60%, #0d1f35 0%, #060a0f 70%);
    position: relative;
    overflow: hidden;
  }
  #login-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(30,48,80,0.3) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(30,48,80,0.3) 40px);
    pointer-events: none;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 380px;
    position: relative;
    box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(30,48,80,0.5);
  }
  .login-card::before {
    content: '';
    position: absolute;
    top: -1px; left: 20%; right: 20%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-logo .brand {
    font-family: 'Orbitron', monospace;
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #e63946, #ff6b35);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .login-logo .sub {
    font-family: 'Share Tech Mono', monospace;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .plane-icon {
    font-size: 2.5rem;
    display: block;
    margin-bottom: 8px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-8px) rotate(5deg); }
  }
  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: 'Share Tech Mono', monospace;
  }
  .form-group input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(230,57,70,0.15);
  }
  .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    color: white;
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: var(--glow);
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(230,57,70,0.7); }
  .btn-login:active { transform: translateY(0); }
  .login-note {
    text-align: center;
    margin-top: 20px;
    color: var(--muted);
    font-size: 0.8rem;
    font-family: 'Share Tech Mono', monospace;
  }
  .error-msg {
    color: var(--accent);
    font-size: 0.8rem;
    margin-top: 6px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* ── GAME SCREEN ── */
  #game-screen { display: flex; flex-direction: column; height: 100vh; }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-brand {
    font-family: 'Orbitron', monospace;
    font-size: 1.3rem;
    font-weight: 900;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-right { display: flex; align-items: center; gap: 20px; }
  .wallet {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .wallet-icon { font-size: 1.1rem; }
  .wallet-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .wallet-amount {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: var(--green);
  }
  .user-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
  }
  .user-avatar {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 700; color: white;
    font-family: 'Orbitron', monospace;
  }
  .logout-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); padding: 6px 12px; border-radius: 6px;
    cursor: pointer; font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem; letter-spacing: 1px;
    transition: border-color 0.2s, color 0.2s;
  }
  .logout-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* History bar */
  .history-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .history-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .history-chips { display: flex; gap: 6px; overflow: hidden; flex-direction: row; }
  .history-chip {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .chip-low { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
  .chip-mid { background: rgba(52,152,219,0.15); color: #3498db; border: 1px solid rgba(52,152,219,0.3); }
  .chip-high { background: rgba(241,196,15,0.15); color: #f1c40f; border: 1px solid rgba(241,196,15,0.3); }
  .chip-mega { background: rgba(230,57,70,0.15); color: #e63946; border: 1px solid rgba(230,57,70,0.3); }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Canvas area */
  .game-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 30% 70%, #0a1a2e 0%, #060a0f 60%);
  }
  canvas#game-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .multiplier-display {
    position: relative;
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }
  .multiplier-value {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(3rem, 8vw, 6rem);
    line-height: 1;
    transition: color 0.1s;
  }
  .multiplier-value.flying { color: white; text-shadow: 0 0 40px rgba(255,255,255,0.3); }
  .multiplier-value.crashed { color: var(--accent); text-shadow: var(--glow); }
  .multiplier-value.waiting { color: var(--muted); }
  .multiplier-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 8px;
  }
  .status-flying { color: var(--green); }
  .status-crashed { color: var(--accent); }
  .status-waiting { color: var(--muted); }
  .countdown-bar {
    width: 200px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
    overflow: hidden;
  }
  .countdown-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.1s linear;
  }

  /* Side panel */
  .side-panel {
    width: 300px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  /* Bet controls */
  .bet-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .bet-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .bet-input-wrap {
    flex: 1;
    position: relative;
  }
  .bet-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 50px 10px 14px;
    color: var(--text);
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    outline: none;
    transition: border-color 0.2s;
  }
  .bet-input:focus { border-color: var(--accent); }
  .bet-input-suffix {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .bet-quick { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .bet-quick-btn {
    flex: 1;
    min-width: 55px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    color: var(--text);
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .bet-quick-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Auto cashout */
  .auto-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .auto-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .auto-input {
    width: 90px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    outline: none;
    text-align: right;
    transition: border-color 0.2s;
  }
  .auto-input:focus { border-color: var(--accent); }
  .toggle {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toggle-switch {
    width: 36px; height: 20px;
    background: var(--border);
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-switch.on { background: var(--accent); }
  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    background: white;
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: left 0.2s;
  }
  .toggle-switch.on::after { left: 18px; }

  /* Bet / Cashout button */
  .action-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-bet {
    background: linear-gradient(135deg, #27ae60, #2ecc71);
    color: white;
    box-shadow: var(--glow-green);
  }
  .btn-bet:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(46,204,113,0.6); }
  .btn-cashout {
    background: linear-gradient(135deg, #e67e22, #f39c12);
    color: white;
    box-shadow: 0 0 20px rgba(230,126,34,0.5);
    animation: pulse-cashout 0.8s ease-in-out infinite;
  }
  @keyframes pulse-cashout {
    0%,100% { box-shadow: 0 0 20px rgba(230,126,34,0.5); }
    50% { box-shadow: 0 0 40px rgba(230,126,34,0.9), 0 0 60px rgba(230,126,34,0.3); }
  }
  .btn-waiting {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    cursor: not-allowed;
  }
  .btn-disabled {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    cursor: not-allowed;
    opacity: 0.5;
  }

  /* Active bet info */
  .active-bet-info {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    padding: 8px 12px;
    background: rgba(46,204,113,0.08);
    border: 1px solid rgba(46,204,113,0.2);
    border-radius: 8px;
  }
  .active-bet-info .info-item { text-align: center; }
  .active-bet-info .info-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
  }
  .active-bet-info .info-value {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--green);
  }

  /* History panel */
  .history-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 16px;
  }
  .history-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .history-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 0.8rem;
    border: 1px solid transparent;
    animation: slide-in 0.3s ease;
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .history-row.win {
    background: rgba(46,204,113,0.07);
    border-color: rgba(46,204,113,0.2);
  }
  .history-row.loss {
    background: rgba(230,57,70,0.07);
    border-color: rgba(230,57,70,0.15);
  }
  .history-row.skipped {
    background: rgba(90,127,160,0.07);
    border-color: rgba(90,127,160,0.15);
  }
  .hr-round {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    min-width: 40px;
  }
  .hr-crash {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 0.8rem;
    flex: 1;
    text-align: center;
  }
  .hr-result {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 0.85rem;
    text-align: right;
    min-width: 70px;
  }
  .win .hr-result { color: var(--green); }
  .loss .hr-result { color: var(--accent); }
  .skipped .hr-result { color: var(--muted); }
  .win .hr-crash { color: var(--green); }
  .loss .hr-crash { color: var(--accent); }
  .skipped .hr-crash { color: var(--muted); }

  /* Stats strip */
  .stats-strip {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .stat-cell {
    background: var(--surface2);
    padding: 10px;
    text-align: center;
  }
  .stat-val {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--text);
  }
  .stat-lbl {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* Toast */
  #toast-container {
    position: fixed;
    top: 70px;
    right: 20px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }
  .toast {
    padding: 12px 20px;
    border-radius: 10px;
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 1px;
    animation: toast-in 0.3s ease, toast-out 0.3s ease 2.7s forwards;
    pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .toast-win {
    background: rgba(46,204,113,0.9);
    color: #062010;
    border: 1px solid var(--green);
  }
  .toast-loss {
    background: rgba(230,57,70,0.9);
    color: #200608;
    border: 1px solid var(--accent);
  }
  .toast-info {
    background: rgba(52,152,219,0.9);
    color: #060d20;
    border: 1px solid #3498db;
  }
  @keyframes toast-in {
    from { opacity: 0; transform: translateX(40px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes toast-out {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(40px); }
  }

  /* Crash overlay */
  .crash-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    pointer-events: none;
  }
  .crash-flash {
    position: absolute;
    inset: 0;
    background: rgba(230,57,70,0.15);
    animation: flash 0.3s ease;
  }
  @keyframes flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  .hidden { display: none !important; }

  /* Responsive */
  @media (max-width: 700px) {
    .side-panel { width: 260px; }
    .header-brand { font-size: 1rem; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <span class="plane-icon">✈️</span>
      <div class="brand">AEROX</div>
      <div class="sub">Virtual Crash Game</div>
    </div>
    <div class="form-group">
      <label>Pilot Name</label>
      <input type="text" id="login-username" placeholder="Enter your callsign" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" />
      <div class="error-msg hidden" id="login-error"></div>
    </div>
    <button class="btn-login" onclick="doLogin()">TAKE OFF →</button>
    <div class="login-note">🎰 Virtual currency only · No real money</div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="hidden">
  <!-- Header -->
  <div class="header">
    <div class="header-brand">✈ AEROX</div>
    <div class="header-right">
      <div class="wallet">
        <span class="wallet-icon"></span>
        <div>
          <div class="wallet-label">Balance</div>
          <div class="wallet-amount" id="wallet-display">10,000</div>
        </div>
      </div>
      <div class="user-badge">
        <div class="user-avatar" id="user-avatar">?</div>
        <span id="user-name-display">Pilot</span>
      </div>
      <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
    </div>
  </div>

  <!-- History bar -->
  <div class="history-bar">
    <span class="history-label">History</span>
    <div class="history-chips" id="history-chips"></div>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Game canvas -->
    <div class="game-area" id="game-area">
      <canvas id="game-canvas"></canvas>
      <div class="multiplier-display" id="multiplier-display">
        <div class="multiplier-value waiting" id="multiplier-value">1.00x</div>
        <div class="multiplier-status status-waiting" id="multiplier-status">WAITING FOR BETS</div>
        <div class="countdown-bar" id="countdown-bar">
          <div class="countdown-fill" id="countdown-fill" style="width:100%"></div>
        </div>
      </div>
    </div>

    <!-- Side panel -->
    <div class="side-panel">
      <div class="bet-section">
        <div class="section-title">Place Bet</div>

        <div class="bet-input-row">
          <div class="bet-input-wrap">
            <input type="number" class="bet-input" id="bet-amount" value="100" min="10" max="10000" step="10" />
            <span class="bet-input-suffix">COINS</span>
          </div>
        </div>

        <div class="bet-quick">
          <button class="bet-quick-btn" onclick="setBet(50)">50</button>
          <button class="bet-quick-btn" onclick="setBet(100)">100</button>
          <button class="bet-quick-btn" onclick="setBet(250)">250</button>
          <button class="bet-quick-btn" onclick="setBet(500)">500</button>
        </div>
        <div class="bet-quick">
          <button class="bet-quick-btn" onclick="setBet(1000)">1K</button>
          <button class="bet-quick-btn" onclick="halfBet()">½</button>
          <button class="bet-quick-btn" onclick="doubleBet()">×2</button>
          <button class="bet-quick-btn" onclick="maxBet()">MAX</button>
        </div>

        <div class="auto-row">
          <span class="auto-label">AUTO CASHOUT</span>
          <div class="toggle">
            <div class="toggle-switch" id="auto-toggle" onclick="toggleAuto()"></div>
            <input type="number" class="auto-input" id="auto-cashout-val" value="2.00" min="1.01" step="0.1" placeholder="2.00" />
          </div>
        </div>

        <button class="action-btn btn-bet" id="action-btn" onclick="handleAction()">BET NOW</button>

        <div class="active-bet-info hidden" id="active-bet-info">
          <div class="info-item">
            <span class="info-label">BET</span>
            <span class="info-value" id="info-bet">-</span>
          </div>
          <div class="info-item">
            <span class="info-label">PROFIT</span>
            <span class="info-value" id="info-profit">-</span>
          </div>
          <div class="info-item">
            <span class="info-label">TOTAL</span>
            <span class="info-value" id="info-total">-</span>
          </div>
        </div>
      </div>

      <div class="history-section">
        <div class="section-title">Round History</div>
        <div class="history-list" id="history-list"></div>
      </div>

      <div class="stats-strip">
        <div class="stat-cell">
          <div class="stat-val" id="stat-wins">0</div>
          <div class="stat-lbl">Wins</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val" id="stat-losses">0</div>
          <div class="stat-lbl">Losses</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val" id="stat-net">+0</div>
          <div class="stat-lbl">Net P/L</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const STARTING_BALANCE = 10000;
const COUNTDOWN_DURATION = 5000; // ms before round starts
const TICK_INTERVAL = 50; // ms per frame

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  user: null,
  balance: STARTING_BALANCE,
  gamePhase: 'countdown', // 'countdown' | 'flying' | 'crashed'
  multiplier: 1.00,
  crashAt: 1.00,
  countdownStart: null,
  betPlaced: false,
  betAmount: 0,
  cashedOut: false,
  cashedOutAt: 0,
  autoEnabled: false,
  autoCashoutAt: 2.00,
  roundHistory: [],
  roundNum: 0,
  stats: { wins: 0, losses: 0, net: 0 },
  animFrame: null,
  tickTimer: null,
  countdownTimer: null,
};

// Canvas
let canvas, ctx, gameArea;
let planeX = 0, planeY = 0, pathPoints = [];

// ─── LOCAL STORAGE ───────────────────────────────────────────────────────────
function saveState() {
  const save = {
    user: state.user,
    balance: state.balance,
    roundHistory: state.roundHistory.slice(0, 50),
    stats: state.stats,
    roundNum: state.roundNum,
  };
  localStorage.setItem('aerox_state', JSON.stringify(save));
}

function loadState() {
  const raw = localStorage.getItem('aerox_state');
  if (!raw) return null;
  try { return JSON.parse(raw); } catch { return null; }
}

// ─── LOGIN ───────────────────────────────────────────────────────────────────
function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');

  if (!username) {
    errorEl.textContent = 'Enter your callsign';
    errorEl.classList.remove('hidden');
    return;
  }
  if (password.length < 3) {
    errorEl.textContent = 'Password must be at least 3 characters';
    errorEl.classList.remove('hidden');
    return;
  }

  errorEl.classList.add('hidden');

  // Load existing save for this user
  const saved = loadState();
  if (saved && saved.user === username) {
    Object.assign(state, {
      user: username,
      balance: saved.balance,
      roundHistory: saved.roundHistory || [],
      stats: saved.stats || { wins: 0, losses: 0, net: 0 },
      roundNum: saved.roundNum || 0,
    });
  } else {
    state.user = username;
    state.balance = STARTING_BALANCE;
    state.roundHistory = [];
    state.stats = { wins: 0, losses: 0, net: 0 };
    state.roundNum = 0;
    saveState();
  }

  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  document.getElementById('user-name-display').textContent = username;
  document.getElementById('user-avatar').textContent = username[0].toUpperCase();

  initGame();
}

document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('login-username').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-password').focus();
});

function doLogout() {
  saveState();
  clearTimers();
  state.user = null;
  state.betPlaced = false;
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
}

// ─── CRASH POINT GENERATION ──────────────────────────────────────────────────
// Weighted random: house edge ~5%, lots of low crashes for tension
function generateCrashPoint() {
  const r = Math.random();
  // Provably unfair demo distribution:
  // ~30% crash at 1.00-1.20, ~25% 1.20-1.70, ~20% 1.70-2.50, ~15% 2.50-5.00, ~10% 5x+
  if (r < 0.30) return +(1.00 + Math.random() * 0.20).toFixed(2);
  if (r < 0.55) return +(1.20 + Math.random() * 0.50).toFixed(2);
  if (r < 0.75) return +(1.70 + Math.random() * 0.80).toFixed(2);
  if (r < 0.90) return +(2.50 + Math.random() * 2.50).toFixed(2);
  if (r < 0.97) return +(5.00 + Math.random() * 10.0).toFixed(2);
  return +(15.0 + Math.random() * 50.0).toFixed(2);
}

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
function initCanvas() {
  canvas = document.getElementById('game-canvas');
  gameArea = document.getElementById('game-area');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}

function resizeCanvas() {
  if (!canvas) return;
  canvas.width = gameArea.clientWidth;
  canvas.height = gameArea.clientHeight;
}

function clearCanvas() {
  if (!ctx) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function drawGame() {
  clearCanvas();
  if (state.gamePhase === 'countdown') {
    drawGrid();
    return;
  }

  const W = canvas.width, H = canvas.height;
  drawGrid();

  if (pathPoints.length < 2) return;

  // Draw filled area under curve
  ctx.beginPath();
  ctx.moveTo(pathPoints[0].x, pathPoints[0].y);
  for (let i = 1; i < pathPoints.length; i++) {
    ctx.lineTo(pathPoints[i].x, pathPoints[i].y);
  }
  ctx.lineTo(pathPoints[pathPoints.length - 1].x, H);
  ctx.lineTo(pathPoints[0].x, H);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  const color = state.gamePhase === 'crashed' ? '230,57,70' : '46,204,113';
  grad.addColorStop(0, `rgba(${color},0.25)`);
  grad.addColorStop(1, `rgba(${color},0.02)`);
  ctx.fillStyle = grad;
  ctx.fill();

  // Draw curve line
  ctx.beginPath();
  ctx.moveTo(pathPoints[0].x, pathPoints[0].y);
  for (let i = 1; i < pathPoints.length; i++) {
    ctx.lineTo(pathPoints[i].x, pathPoints[i].y);
  }
  ctx.strokeStyle = state.gamePhase === 'crashed' ? '#e63946' : '#2ecc71';
  ctx.lineWidth = 3;
  ctx.shadowColor = state.gamePhase === 'crashed' ? '#e63946' : '#2ecc71';
  ctx.shadowBlur = 12;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Draw plane at last point
  if (state.gamePhase === 'flying' && pathPoints.length > 0) {
    const last = pathPoints[pathPoints.length - 1];
    drawPlane(last.x, last.y);
  }
}

function drawGrid() {
  const W = canvas.width, H = canvas.height;
  ctx.strokeStyle = 'rgba(30,48,80,0.4)';
  ctx.lineWidth = 1;
  const cols = 8, rows = 5;
  for (let i = 1; i < cols; i++) {
    ctx.beginPath();
    ctx.moveTo(W * i / cols, 0);
    ctx.lineTo(W * i / cols, H);
    ctx.stroke();
  }
  for (let i = 1; i < rows; i++) {
    ctx.beginPath();
    ctx.moveTo(0, H * i / rows);
    ctx.lineTo(W, H * i / rows);
    ctx.stroke();
  }
}

function drawPlane(x, y) {
  ctx.save();
  // Calculate angle from previous point
  let angle = -0.3;
  if (pathPoints.length >= 2) {
    const prev = pathPoints[pathPoints.length - 2];
    const curr = pathPoints[pathPoints.length - 1];
    angle = Math.atan2(curr.y - prev.y, curr.x - prev.x);
  }
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.font = '28px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('✈', 0, 0);
  ctx.restore();
}

// ─── CURVE MATH ───────────────────────────────────────────────────────────────
function multiplierToY(m) {
  const H = canvas ? canvas.height : 400;
  const logM = Math.log(Math.max(m, 1));
  const logCrash = Math.log(Math.max(state.crashAt, 1.1));
  const progress = Math.min(logM / logCrash, 1);
  return H - (progress * H * 0.82) - H * 0.05;
}

function roundElapsedToX(elapsed, totalDuration) {
  const W = canvas ? canvas.width : 800;
  const progress = Math.min(elapsed / totalDuration, 1);
  return W * 0.05 + progress * W * 0.88;
}

// ─── GAME FLOW ─────────────────────────────────────────────────────────────────
let roundStartTime = null;
let roundDuration = 20000; // max visual duration ms

function initGame() {
  initCanvas();
  updateWalletDisplay();
  renderHistoryBar();
  renderHistoryList();
  updateStats();
  startCountdown();
}

function clearTimers() {
  if (state.tickTimer) clearInterval(state.tickTimer);
  if (state.countdownTimer) clearTimeout(state.countdownTimer);
  state.tickTimer = null;
  state.countdownTimer = null;
}

function startCountdown() {
  clearTimers();
  state.gamePhase = 'countdown';
  state.multiplier = 1.00;
  state.betPlaced = false;
  state.cashedOut = false;
  state.cashedOutAt = 0;
  state.crashAt = generateCrashPoint();
  pathPoints = [];

  updateMultiplierDisplay();
  updateActionButton();
  document.getElementById('active-bet-info').classList.add('hidden');
  document.getElementById('countdown-bar').style.display = 'block';

  const DURATION = 5000;
  const startTime = Date.now();

  const tick = () => {
    const elapsed = Date.now() - startTime;
    const pct = Math.max(0, 1 - elapsed / DURATION);
    document.getElementById('countdown-fill').style.width = (pct * 100) + '%';
    if (elapsed < DURATION) {
      state.tickTimer = setTimeout(tick, 50);
    }
  };
  tick();

  state.countdownTimer = setTimeout(() => {
    startRound();
  }, DURATION);
}

function startRound() {
  clearTimers();
  state.gamePhase = 'flying';
  state.roundNum++;
  roundStartTime = Date.now();
  document.getElementById('countdown-bar').style.display = 'none';

  // Calculate how long this round will last visually
  const logCrash = Math.log(Math.max(state.crashAt, 1.01));
  roundDuration = Math.max(3000, logCrash * 8000);

  updateActionButton();
  updateMultiplierDisplay();

  // Start tick
  state.tickTimer = setInterval(() => {
    if (state.gamePhase !== 'flying') return;

    const elapsed = Date.now() - roundStartTime;
    const progress = elapsed / roundDuration;

    // Multiplier grows exponentially
    state.multiplier = Math.max(1.00, Math.exp(progress * Math.log(Math.max(state.crashAt, 1.01))));
    state.multiplier = Math.round(state.multiplier * 100) / 100;

    // Update path
    const x = roundElapsedToX(elapsed, roundDuration);
    const y = multiplierToY(state.multiplier);
    pathPoints.push({ x, y });
    if (pathPoints.length === 1) {
      // ensure start from bottom-left
      const H = canvas.height;
      pathPoints.unshift({ x: roundElapsedToX(0, roundDuration), y: H * 0.95 });
    }

    updateMultiplierDisplay();
    updateActiveBetInfo();
    drawGame();

    // Auto cashout
    if (state.betPlaced && !state.cashedOut && state.autoEnabled) {
      if (state.multiplier >= state.autoCashoutAt) {
        cashOut();
      }
    }

    // Crash check
    if (state.multiplier >= state.crashAt || progress >= 1) {
      state.multiplier = state.crashAt;
      triggerCrash();
    }
  }, TICK_INTERVAL);
}

function triggerCrash() {
  clearTimers();
  state.gamePhase = 'crashed';

  // If bet placed and not cashed out = loss
  if (state.betPlaced && !state.cashedOut) {
    state.balance -= state.betAmount;
    if (state.balance < 0) state.balance = 0;
    state.stats.losses++;
    state.stats.net -= state.betAmount;
    showToast(`💥 CRASHED at ${state.crashAt}x — Lost ${state.betAmount} coins`, 'loss');
    addHistoryRow(state.crashAt, -state.betAmount);
  } else if (!state.betPlaced) {
    addHistoryRow(state.crashAt, null);
  }

  updateWalletDisplay();
  updateStats();
  updateMultiplierDisplay();
  updateActionButton();
  document.getElementById('active-bet-info').classList.add('hidden');

  // Draw crash frame
  drawGame();

  // Schedule next round
  saveState();
  state.tickTimer = setTimeout(() => {
    startCountdown();
  }, 3000);
}

function cashOut() {
  if (!state.betPlaced || state.cashedOut || state.gamePhase !== 'flying') return;
  state.cashedOut = true;
  state.cashedOutAt = state.multiplier;

  const profit = Math.round(state.betAmount * state.cashedOutAt - state.betAmount);
  const total = Math.round(state.betAmount * state.cashedOutAt);
  state.balance += total;
  state.stats.wins++;
  state.stats.net += profit;

  updateWalletDisplay();
  updateStats();
  updateActionButton();
  showToast(`🎉 CASHED OUT at ${state.cashedOutAt}x — Won +${profit} coins`, 'win');
  addHistoryRow(state.crashAt, profit, state.cashedOutAt);
  saveState();
}

// ─── UI UPDATES ───────────────────────────────────────────────────────────────
function updateWalletDisplay() {
  document.getElementById('wallet-display').textContent = state.balance.toLocaleString();
}

function updateMultiplierDisplay() {
  const valEl = document.getElementById('multiplier-value');
  const statusEl = document.getElementById('multiplier-status');

  valEl.textContent = state.multiplier.toFixed(2) + 'x';
  valEl.className = 'multiplier-value';

  if (state.gamePhase === 'countdown') {
    valEl.classList.add('waiting');
    statusEl.textContent = 'WAITING FOR BETS';
    statusEl.className = 'multiplier-status status-waiting';
  } else if (state.gamePhase === 'flying') {
    valEl.classList.add('flying');
    statusEl.textContent = state.betPlaced && !state.cashedOut ? '🚀 FLYING — CASH OUT!' : '🚀 FLYING';
    statusEl.className = 'multiplier-status status-flying';
  } else if (state.gamePhase === 'crashed') {
    valEl.classList.add('crashed');
    statusEl.textContent = `💥 FLEW AWAY!`;
    statusEl.className = 'multiplier-status status-crashed';
  }
}

function updateActionButton() {
  const btn = document.getElementById('action-btn');
  btn.className = 'action-btn';

  if (state.gamePhase === 'countdown') {
    if (!state.betPlaced) {
      btn.textContent = 'BET NOW';
      btn.classList.add('btn-bet');
      btn.disabled = false;
    } else {
      btn.textContent = '✓ BET PLACED — WAITING';
      btn.classList.add('btn-waiting');
      btn.disabled = true;
    }
  } else if (state.gamePhase === 'flying') {
    if (state.betPlaced && !state.cashedOut) {
      btn.textContent = ' CASH OUT ' + state.multiplier.toFixed(2) + 'x';
      btn.classList.add('btn-cashout');
      btn.disabled = false;
    } else if (state.cashedOut) {
      btn.textContent = '✓ CASHED OUT @ ' + state.cashedOutAt.toFixed(2) + 'x';
      btn.classList.add('btn-waiting');
      btn.disabled = true;
    } else {
      btn.textContent = 'ROUND IN PROGRESS';
      btn.classList.add('btn-disabled');
      btn.disabled = true;
    }
  } else if (state.gamePhase === 'crashed') {
    btn.textContent = 'NEXT ROUND...';
    btn.classList.add('btn-disabled');
    btn.disabled = true;
  }
}

function updateActiveBetInfo() {
  if (!state.betPlaced || state.cashedOut) return;
  const info = document.getElementById('active-bet-info');
  info.classList.remove('hidden');
  const profit = Math.round(state.betAmount * state.multiplier - state.betAmount);
  const total = Math.round(state.betAmount * state.multiplier);
  document.getElementById('info-bet').textContent = state.betAmount;
  document.getElementById('info-profit').textContent = '+' + profit;
  document.getElementById('info-total').textContent = total;
}

function handleAction() {
  if (state.gamePhase === 'countdown' && !state.betPlaced) {
    placeBet();
  } else if (state.gamePhase === 'flying' && state.betPlaced && !state.cashedOut) {
    cashOut();
  }
}

function placeBet() {
  const amount = parseInt(document.getElementById('bet-amount').value);
  if (isNaN(amount) || amount < 10) { showToast('Minimum bet is 10 coins', 'info'); return; }
  if (amount > state.balance) { showToast('Insufficient balance!', 'loss'); return; }

  state.betPlaced = true;
  state.betAmount = amount;
  state.autoEnabled = document.getElementById('auto-toggle').classList.contains('on');
  state.autoCashoutAt = parseFloat(document.getElementById('auto-cashout-val').value) || 2.0;

  updateActionButton();
  document.getElementById('active-bet-info').classList.remove('hidden');
  document.getElementById('info-bet').textContent = amount;
  document.getElementById('info-profit').textContent = '0';
  document.getElementById('info-total').textContent = amount;
  showToast(`Bet placed: ${amount} coins`, 'info');
}

// ─── HISTORY ─────────────────────────────────────────────────────────────────
function addHistoryRow(crashAt, result, cashedAt) {
  const entry = {
    round: state.roundNum,
    crashAt,
    result,
    cashedAt: cashedAt || null,
    time: Date.now()
  };
  state.roundHistory.unshift(entry);
  if (state.roundHistory.length > 100) state.roundHistory.pop();
  renderHistoryBar();
  renderHistoryList();
}

function renderHistoryBar() {
  const el = document.getElementById('history-chips');
  el.innerHTML = '';
  const recent = state.roundHistory.slice(0, 20);
  recent.forEach(r => {
    const chip = document.createElement('div');
    chip.className = 'history-chip ' + chipClass(r.crashAt);
    chip.textContent = r.crashAt.toFixed(2) + 'x';
    el.appendChild(chip);
  });
}

function chipClass(v) {
  if (v < 1.5) return 'chip-low';
  if (v < 3) return 'chip-mid';
  if (v < 10) return 'chip-high';
  return 'chip-mega';
}

function renderHistoryList() {
  const el = document.getElementById('history-list');
  el.innerHTML = '';
  state.roundHistory.slice(0, 30).forEach(r => {
    const row = document.createElement('div');
    let cls = 'history-row ';
    let resultText = '—';
    if (r.result === null || r.result === undefined) {
      cls += 'skipped';
      resultText = 'No bet';
    } else if (r.result >= 0) {
      cls += 'win';
      resultText = '+' + r.result;
    } else {
      cls += 'loss';
      resultText = '' + r.result;
    }
    row.className = cls;
    row.innerHTML = `
      <span class="hr-round">#${r.round}</span>
      <span class="hr-crash">${r.crashAt.toFixed(2)}x</span>
      <span class="hr-result">${resultText}</span>
    `;
    el.appendChild(row);
  });
}

function updateStats() {
  document.getElementById('stat-wins').textContent = state.stats.wins;
  document.getElementById('stat-losses').textContent = state.stats.losses;
  const net = state.stats.net;
  const netEl = document.getElementById('stat-net');
  netEl.textContent = (net >= 0 ? '+' : '') + net;
  netEl.style.color = net >= 0 ? 'var(--green)' : 'var(--accent)';
}

// ─── BET HELPERS ─────────────────────────────────────────────────────────────
function setBet(val) {
  document.getElementById('bet-amount').value = val;
}
function halfBet() {
  const v = parseInt(document.getElementById('bet-amount').value) || 100;
  document.getElementById('bet-amount').value = Math.max(10, Math.floor(v / 2));
}
function doubleBet() {
  const v = parseInt(document.getElementById('bet-amount').value) || 100;
  document.getElementById('bet-amount').value = Math.min(state.balance, v * 2);
}
function maxBet() {
  document.getElementById('bet-amount').value = state.balance;
}
function toggleAuto() {
  const t = document.getElementById('auto-toggle');
  t.classList.toggle('on');
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg, type) {
  const tc = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  tc.appendChild(t);
  setTimeout(() => t.remove(), 3100);
}

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    handleAction();
  }
});
</script>
